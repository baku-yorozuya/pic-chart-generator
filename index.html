<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta property="og:site_name" content="Pic-chart Generator - 為你的圓餅加上圖片">
    <meta property="title" content="Pic-chart Generator - 為你的圓餅加上圖片">
    <meta property="og:title" content="Pic-chart Generator - 為你的圓餅加上圖片">
    <meta property="description" content="圓餅圖視覺化工具，讓使用者能將自定義圖片嵌入扇形區域，並透過演算法自動排列標籤防止重疊。可直接導出為 PNG 格式。">
    <meta property="og:description" content="圓餅圖視覺化工具，讓使用者能將自定義圖片嵌入扇形區域，並透過演算法自動排列標籤防止重疊。可直接導出為 PNG 格式。">
    <meta property="og:image" content="https://raw.githubusercontent.com/baku-yorozuya/pic-chart-generator/refs/heads/main/public/preview-1200x630.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta property="og:image:type" content="image/png">
    <meta property="og:url" content="https://pic-chart-generator.vercel.app">
    <meta name="thumbnail" content="https://raw.githubusercontent.com/baku-yorozuya/pic-chart-generator/refs/heads/main/public/preview-500x500.png" />
    <link rel="icon" sizes="48x48" href="public/favicon-48x48.png" type="image/png">
    <link rel="icon" sizes="192x192" href="public/favicon.png" type="image/png">
    <link rel="icon" sizes="512x512" href="public/favicon-512x512.png" type="image/png">
    <link rel="apple-touch-icon" href="public/favicon-512x512.png">
    <title>Pic-chart Generator - 為你的圓餅加上圖片</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/BaseOverlay.css" />
    <link rel="stylesheet" href="css/Toolbar.css" />
    <link rel="stylesheet" href="css/DonationModal.css" />
    <link rel="stylesheet" href="css/CommentDrawer.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Pic-chart Generator",
        "operatingSystem": "Windows, macOS, Android, iOS",
        "applicationCategory": "DesignApplication",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "HKD"
        },
        "featureList": "圖片嵌入餅塊, 自動標籤防撞演算法, 高解析度 PNG 導出, 即時數據編輯",
        "description": "這是一款圓餅圖視覺化工具，讓使用者能將自定義圖片嵌入扇形區域，並透過演算法自動排列標籤防止重疊。可直接導出為 PNG 格式。"
      }
    </script>
  </head>
  <body>
    <!-- 隱藏預覽縮圖 -->
    <img src="public/preview_500_500.png" alt="preview" style="display:none;" aria-hidden="true" />

    <div id="app-overlay" class="overlay-mask"></div>

    <main id="app-root">
      <header class="app-header">
        <h1>🥧 Pic-chart Generator 🥧</h1>
      </header>

      <div id="hint-bar" class="hint-bar">
        <span id="hint-text">
          💡 點擊餅塊編輯圖片位置 | 編輯下方清單調整數據 💡
        </span>
      </div>

      <section id="chart-viewport">
        <svg id="main-svg-canvas" preserveAspectRatio="xMidYMid meet"></svg>
      </section>

      <div class="fab-container">
        <button id="btn-export" class="fab" style="background: #6c5ce7">
          🖼️ 輸出 PNG
        </button>
        <button id="btn-donation" class="fab">🧀 支持</button>
        <button id="btn-comments" class="fab">💬 留言</button>
      </div>

      <aside id="toolbar-container"></aside>
    </main>

    <div id="modal-container"></div>
    <div id="drawer-container"></div>

    <script src="js/namespace.js" ></script>
    <script src="js/core/EventEmitter.js"></script>
    <script src="js/core/State.js"></script>

    <script src="js/components/BaseOverlay.js"></script>
    <script src="js/components/PicChart.js"></script>
    <script src="js/components/Toolbar.js"></script>
    <script src="js/components/DonationModal.js"></script>
    <script src="js/components/CommentDrawer.js"></script>

    <script src="js/middleware/Interaction.js"></script>
    <script src="js/middleware/Export.js"></script>

    <script src="js/app.js"></script>
  </body>
</html>
